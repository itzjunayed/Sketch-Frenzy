services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sketch-frenzy-backend
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/sketchfrenzy
      - NODE_ENV=development
      - PORT=5000
      - REDIS_URL=redis://redis:6379
      - FRONTEND_URL=http://localhost:5173
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sketch-frenzy-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sketch-frenzy-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_BACKEND_URL=http://localhost:5000
      - VITE_SOCKET_URL=http://localhost:5000
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - sketch-frenzy-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5173"]
      interval: 10s
      timeout: 5s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: sketch-frenzy-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    networks:
      - sketch-frenzy-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
  
  postgres:
    image: postgres:15-alpine
    container_name: sketch-frenzy-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: sketchfrenzy
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/10-schema.sql  # Init DB
    networks:
      - sketch-frenzy-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sketchfrenzy"]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  sketch-frenzy-network:
    driver: bridge

volumes:
  redis-data:
  postgres-data:
